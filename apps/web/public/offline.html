<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>openai-hackaton offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #ffffff;
        color: #171717;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #ffffff;
      }

      main {
        width: min(100%, 28rem);
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 28px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 1px 3px rgb(0 0 0 / 10%);
      }

      img {
        width: 64px;
        height: 64px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        color: #737373;
        line-height: 1.6;
      }

      button {
        min-height: 44px;
        border: 1px solid #171717;
        border-radius: 8px;
        padding: 0 18px;
        color: #ffffff;
        background: #171717;
        font: inherit;
        font-weight: 700;
      }

      @media (prefers-color-scheme: dark) {
        :root,
        body {
          background: #171717;
          color: #fafafa;
        }

        main {
          border-color: #404040;
          background: #262626;
        }

        p {
          color: #a3a3a3;
        }

        button {
          border-color: #fafafa;
          color: #171717;
          background: #fafafa;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>You are offline</h1>
      <p>Reconnect to the internet to continue using this app.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
