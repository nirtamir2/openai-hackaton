<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>openai-hackaton offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0b1020;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(45, 212, 191, 0.22), transparent 34rem),
          radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.18), transparent 30rem),
          #0b1020;
      }

      main {
        width: min(100%, 28rem);
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background: rgba(5, 5, 24, 0.78);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      }

      img {
        width: 64px;
        height: 64px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.5rem;
        line-height: 1.2;
      }

      p {
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        padding: 0 18px;
        color: #ffffff;
        background: #2dd4bf;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>You are offline</h1>
      <p>Reconnect to the internet to continue using this app.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
